name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          pip install ruff mypy pydantic-settings

      - name: Ruff lint
        run: ruff check app/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check app/ scripts/ tests/

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    continue-on-error: true  # Tests require live DB and API keys — skipped in CI without secrets
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.TEST_OPENROUTER_API_KEY }}
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short
